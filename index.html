<style>
        /* 1. 深紫色背景與愛心動畫容器 */
        .hero {
            background: linear-gradient(135deg, #4b0082 0%, #2e004f 100%) !important; /* 深紫色底 */
            position: relative;
            overflow: hidden; /* 確保愛心不會飄出區塊 */
            color: #ffffff !important; /* 確保文字在深色底是白色的 */
        }

        /* 2. 關於標題行的顏色調整 */
        .titles-container {
            margin-bottom: 0.8rem;
        }
        
        .title-line {
           position: relative;
           padding-left: 1.6rem;
           font-weight: bold;
           color: #e6e6fa !important; /* 淺薰衣草色文字，在深底更清楚 */
           margin-bottom: 0.2rem !important;
           display: flex;
           align-items: center;
        }

        .title-line:before {
             content: "●";
             color: #dcd0ff; 
             font-size: 0.75em;
             margin-right: 0.6rem;
             text-shadow: 0 0 8px rgba(220, 208, 255, 0.8);
         }

        /* 3. 愛心泡泡動畫核心代碼 */
        .hero::after {
            content: "♥";
            position: absolute;
            color: rgba(255, 182, 193, 0.3); /* 半透明粉色愛心 */
            font-size: 2rem;
            animation: floatingHearts 10s infinite ease-in-out;
            pointer-events: none;
        }

        /* 這裡定義多個愛心的飄動效果 */
        @keyframes floatingHearts {
            0% { transform: translateY(100vh) translateX(0) rotate(0deg); opacity: 0; }
            20% { opacity: 0.6; }
            100% { transform: translateY(-100px) translateX(100px) rotate(360deg); opacity: 0; }
        }

        /* 讓愛心更豐富（偽元素模擬多個泡泡） */
        .hero-content::before {
            content: "♥   ♥       ♥";
            position: absolute;
            top: 10%;
            left: 5%;
            color: rgba(255, 255, 255, 0.1);
            font-size: 3rem;
            animation: floatingHearts 15s infinite linear;
            white-space: pre;
        }
        
        .title-line:last-child {
            margin-bottom: 0 !important;
        }
    </style>

        // Initialize page

        // Load profile data
        function loadProfileData() {
            // Update home section
            document.getElementById('name').textContent = profileData.name;
            document.getElementById('title1').textContent = profileData.title1;
            document.getElementById('title2').textContent = profileData.title2;

        // Filter and render projects
        function filterProjects(category) {
            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            renderProjects(category);
        }

        function renderProjects(category) {
            const grid = document.getElementById('projects-grid');
            const filteredProjects = category === 'all' ? projects : projects.filter(p => p.category === category);

            grid.innerHTML = filteredProjects.map(project => {
                return `
                    <div class="project-card" data-category="${project.category}" onclick="openProject(${project.id})">
                        <div class="project-number">${project.id}</div>
                        <h5>${project.title}</h5>
                        <p class="text-muted">${project.description}</p>
                        <small class="text-primary">點進去看會有更精彩的</small>
                    </div>
                `;
            }).join('');
        }

        // Open project details
        function openProject(id) {
            // Navigate to unit.html with unit ID as parameter
            window.open(`unit.html?unit=${id}`, '_blank');
        }

        // Scroll animations
        function initScrollAnimations() {
            const observerOptions = {
                threshold: 0.1,
                rootMargin: '0px 0px -50px 0px'
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.fade-in').forEach(el => {
                observer.observe(el);
            });
        }

        // Smooth scrolling for navigation links
        function initSmoothScrolling() {
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function (e) {
                    e.preventDefault();
                    const target = document.querySelector(this.getAttribute('href'));
                    if (target) {
                        const headerOffset = 70;
                        const elementPosition = target.getBoundingClientRect().top;
                        const offsetPosition = elementPosition + window.pageYOffset - headerOffset;

                        window.scrollTo({
                            top: offsetPosition,
                            behavior: 'smooth'
                        });
                    }
                });
            });
        }

        // Navbar background on scroll
        window.addEventListener('scroll', function() {
            const navbar = document.querySelector('.navbar');
            if (window.scrollY > 50) {
                navbar.style.background = 'rgba(255,255,255,0.98)';
            } else {
                navbar.style.background = 'rgba(255,255,255,0.95)';
            }
        });
